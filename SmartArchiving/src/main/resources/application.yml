spring:
  profiles:
    active: "local"
  output:
    ansi:
      enabled: NEVER

---
#공통
spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  main:
    allow-bean-definition-overriding: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false
  quartz:
    job-store-type: memory
    properties:
      org.quartz.scheduler.instanceName: MyQuartzScheduler
      org.quartz.scheduler.skipUpdateCheck: true
      org.quartz.scheduler.jobFactory.class: org.quartz.simpl.SimpleJobFactory
      org.quartz.threadPool.class: org.quartz.simpl.SimpleThreadPool
      org.quartz.threadPool.threadCount: 3
      org.quartz.jobStore.class: org.quartz.simpl.RAMJobStore
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
    mvc:
      view:
        cache: false
    web:
      resources:
        cache:
          period: 0
        chain:
          cache: false

  # Jersey must not use the default "/*" mapping (it would starve Spring MVC / JSP).
  jersey:
    application-path: /api

server:
  servlet:
    context-path: /SmartArchiving
    session:
      cookie:
        http-only: true
        secure: false
        same-site: strict
      timeout: 30m
    jsp:
      init-parameters:
        development: true
        javaEncoding: UTF-8
        pageEncoding: UTF-8
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

app:
  server:
    crypted-server: MF.SEED

